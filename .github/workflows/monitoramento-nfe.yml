name: Atualizar Monitoramento NFe

on:
  schedule:
    - cron: '*/20 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  atualizar:
    runs-on: ubuntu-latest
    env:
      NR_ACCOUNT: "4230883"
    steps:
      - uses: actions/checkout@v4

      - name: Instalar New Relic CLI
        run: |
          curl -Ls https://download.newrelic.com/install/newrelic-cli/scripts/install.sh | bash
          newrelic version

      - name: Configurar profile
        env:
          NEW_RELIC_API_KEY: ${{ secrets.NEW_RELIC_API_KEY }}
        run: |
          newrelic profile add --profile hotmart --apiKey "$NEW_RELIC_API_KEY" --accountId $NR_ACCOUNT --region US -y
          newrelic profile default --profile hotmart

      - name: Coletar dados do New Relic
        run: bash scripts/coletar-monitoramento-nfe.sh

      - name: Commit e push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add LogsAlteracoes/monitoramento-nfe-data.js
          if git diff --cached --quiet; then
            echo "Sem alteracoes, pulando commit"
          else
            git commit -m "monitoramento-nfe: atualizar dados $(TZ='America/Sao_Paulo' date '+%d/%m %H:%M')"
            git push
          fi
