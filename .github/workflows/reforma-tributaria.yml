name: Verificar Reforma Tributária

on:
  schedule:
    - cron: '0 12 * * *'  # Uma vez ao dia às 9h Brasília (12h UTC)
  workflow_dispatch:

permissions:
  contents: write

jobs:
  verificar:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Verificar alterações na página de marcos
        run: bash scripts/crawler-reforma-tributaria.sh

      - name: Commit e push (se houver alteração)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add LogsAlteracoes/.reforma-tributaria-hash LogsAlteracoes/reforma-tributaria-data.js
          if git diff --cached --quiet; then
            echo "Sem alteracoes, pulando commit"
          else
            git commit -m "reforma-tributaria: verificação diária $(TZ='America/Sao_Paulo' date '+%d/%m')"
            git push
          fi
