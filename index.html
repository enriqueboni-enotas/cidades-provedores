<!DOCTYPE html>
<html lang="pt-BR" class="light">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cidades & Provedores — app-gw</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Nunito+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    /* Cosmos Dark (default) */
    :root {
      --bg: var(--hc-color-neutral-100);
      --surface: var(--hc-color-neutral-200);
      --surface2: var(--hc-color-neutral-300);
      --border: var(--hc-color-neutral-400);
      --accent: var(--hc-color-primary-500);
      --accent2: var(--hc-color-secondary-500);
      --warn: var(--hc-color-warning-400);
      --danger: var(--hc-color-danger-400);
      --text: var(--hc-color-neutral-800);
      --muted: var(--hc-color-neutral-500);
      --code-bg: var(--hc-color-neutral-0);
      --pr: var(--hc-color-info-400);
      --heading: var(--hc-color-neutral-1000);

      /* Cosmos dark tokens */
      --hc-color-primary-100: #162c64;
      --hc-color-primary-200: #253f82;
      --hc-color-primary-300: #355cc0;
      --hc-color-primary-400: #5981e3;
      --hc-color-primary-500: #89a8f8;
      --hc-color-primary-600: #bed1ff;
      --hc-color-primary-700: #ebf0ff;
      --hc-color-secondary-100: #024242;
      --hc-color-secondary-200: #066262;
      --hc-color-secondary-300: #0a9090;
      --hc-color-secondary-400: #51c1c3;
      --hc-color-secondary-500: #7cdbdb;
      --hc-color-secondary-600: #a2eaea;
      --hc-color-secondary-700: #edffff;
      --hc-color-success-400: #009d43;
      --hc-color-success-500: #4acc82;
      --hc-color-warning-400: #efba0f;
      --hc-color-warning-500: #fbd458;
      --hc-color-danger-400: #d6342c;
      --hc-color-danger-500: #e37570;
      --hc-color-info-400: #5981e3;
      --hc-color-info-500: #89a8f8;
      --hc-color-neutral-0: #000000;
      --hc-color-neutral-100: #191c1f;
      --hc-color-neutral-200: #282c2f;
      --hc-color-neutral-300: #32363b;
      --hc-color-neutral-400: #464b52;
      --hc-color-neutral-500: #707780;
      --hc-color-neutral-600: #9ea4ac;
      --hc-color-neutral-700: #c9ced4;
      --hc-color-neutral-800: #e6e9ed;
      --hc-color-neutral-900: #f7f9fa;
      --hc-color-neutral-1000: #ffffff;
    }

    /* Cosmos Light */
    html.light {
      --hc-color-primary-100: #ebf0ff;
      --hc-color-primary-200: #bed1ff;
      --hc-color-primary-300: #89a8f8;
      --hc-color-primary-400: #5981e3;
      --hc-color-primary-500: #355cc0;
      --hc-color-primary-600: #253f82;
      --hc-color-primary-700: #162c64;
      --hc-color-secondary-100: #edffff;
      --hc-color-secondary-200: #a2eaea;
      --hc-color-secondary-300: #7cdbdb;
      --hc-color-secondary-400: #51c1c3;
      --hc-color-secondary-500: #0a9090;
      --hc-color-secondary-600: #066262;
      --hc-color-secondary-700: #024242;
      --hc-color-success-400: #009d43;
      --hc-color-success-500: #006e2f;
      --hc-color-warning-400: #efba0f;
      --hc-color-warning-500: #a47c00;
      --hc-color-danger-400: #d6342c;
      --hc-color-danger-500: #a81a0a;
      --hc-color-info-400: #5981e3;
      --hc-color-info-500: #355cc0;
      --hc-color-neutral-0: #ffffff;
      --hc-color-neutral-100: #f7f9fa;
      --hc-color-neutral-200: #e6e9ed;
      --hc-color-neutral-300: #c9ced4;
      --hc-color-neutral-400: #9ea4ac;
      --hc-color-neutral-500: #707780;
      --hc-color-neutral-600: #464b52;
      --hc-color-neutral-700: #32363b;
      --hc-color-neutral-800: #282c2f;
      --hc-color-neutral-900: #191c1f;
      --hc-color-neutral-1000: #000000;
    }

    body {
      font-family: 'Nunito Sans', -apple-system, blinkmacsystemfont, 'Segoe UI', helvetica, arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
      font-size: 15px;
      min-height: 100vh;
    }

    /* TOPBAR */
    .topbar {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 16px 32px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .topbar h1 {
      font-size: 20px;
      color: var(--heading);
    }

    .topbar .stats {
      color: var(--muted);
      font-size: 13px;
    }

    .topbar-right {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .theme-toggle {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 20px;
      width: 48px;
      height: 26px;
      cursor: pointer;
      position: relative;
      transition: background .3s, border-color .3s;
      flex-shrink: 0;
    }

    .theme-toggle::after {
      content: '🌙';
      position: absolute;
      top: 3px;
      left: 3px;
      width: 20px;
      height: 20px;
      border-radius: 50%;
      background: var(--accent);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      transition: transform .3s, background .3s;
    }

    html.light .theme-toggle::after {
      content: '☀️';
      transform: translateX(22px);
      background: var(--warn);
    }

    /* LANDING */
    .landing {
      max-width: 600px;
      margin: 80px auto 0;
      padding: 0 24px;
      text-align: center;
    }

    .landing h2 {
      font-size: 24px;
      color: var(--heading);
      margin-bottom: 8px;
    }

    .landing p {
      color: var(--muted);
      font-size: 14px;
      margin-bottom: 32px;
    }

    .mode-btns {
      display: flex;
      gap: 16px;
      justify-content: center;
    }

    .mode-btn {
      flex: 1;
      max-width: 240px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 28px 20px;
      cursor: pointer;
      transition: border-color .2s, transform .15s;
      text-align: center;
    }

    .mode-btn:hover {
      border-color: var(--accent);
      transform: translateY(-2px);
    }

    .mode-btn.active {
      border-color: var(--accent);
      background: var(--surface2);
    }

    .mode-btn .icon {
      font-size: 32px;
      margin-bottom: 8px;
    }

    .mode-btn .label {
      font-size: 16px;
      font-weight: 600;
      color: var(--text);
    }

    .mode-btn .desc {
      font-size: 12px;
      color: var(--muted);
      margin-top: 4px;
    }

    /* SEARCH */
    .search-area {
      max-width: 600px;
      margin: 28px auto 0;
      padding: 0 24px;
      display: none;
    }

    .search-area.on {
      display: block;
    }

    .search-wrap {
      position: relative;
    }

    .search-wrap input {
      width: 100%;
      padding: 14px 18px;
      border-radius: 12px;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text);
      font-size: 15px;
      outline: none;
      transition: border-color .2s;
    }

    .search-wrap input:focus {
      border-color: var(--accent);
    }

    .search-wrap input::placeholder {
      color: var(--muted);
    }

    .ac-list {
      position: absolute;
      top: 100%;
      left: 0;
      right: 0;
      background: var(--surface);
      border: 1px solid var(--border);
      border-top: none;
      border-radius: 0 0 12px 12px;
      max-height: 320px;
      overflow-y: auto;
      z-index: 50;
      display: none;
    }

    .ac-list.on {
      display: block;
    }

    .ac-item {
      padding: 12px 18px;
      cursor: pointer;
      border-bottom: 1px solid var(--border);
      transition: background .15s;
    }

    .ac-item:last-child {
      border-bottom: none;
    }

    .ac-item:hover,
    .ac-item.sel {
      background: var(--surface2);
    }

    .ac-item .ac-name {
      font-size: 14px;
      color: var(--text);
      font-weight: 500;
    }

    .ac-item .ac-sub {
      font-size: 12px;
      color: var(--muted);
    }

    .ac-item mark {
      background: transparent;
      color: var(--accent);
      font-weight: 700;
    }

    .search-hint {
      color: var(--muted);
      font-size: 12px;
      margin-top: 8px;
      text-align: center;
    }

    /* DETAIL */
    #detail {
      display: none;
    }

    #detail.on {
      display: block;
    }

    #home.off {
      display: none;
    }

    /* BACK BUTTON */
    .back-btn {
      background: rgba(255, 255, 255, 0.08);
      color: var(--muted);
      border: 1px solid rgba(255, 255, 255, 0.15);
      padding: 6px 16px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 13px;
      transition: background .2s, border-color .2s, color .2s;
      display: flex;
      align-items: center;
      gap: 4px;
      width: fit-content;
      margin-bottom: 32px;
    }

    .back-btn:hover {
      background: rgba(255, 255, 255, 0.14);
      border-color: var(--accent);
      color: var(--heading);
    }

    html.light .back-btn {
      background: rgba(0, 0, 0, 0.05);
      border-color: rgba(0, 0, 0, 0.15);
    }

    html.light .back-btn:hover {
      background: rgba(0, 0, 0, 0.1);
    }

    /* ── DOSSIÊ HEADER ── */
    .header {
      background: linear-gradient(135deg, var(--hc-color-neutral-200) 0%, var(--hc-color-neutral-100) 100%);
      border-bottom: 1px solid var(--border);
      padding: 32px 40px 36px;
      position: relative;
      overflow: hidden;
    }

    html.light .header {
      background: linear-gradient(135deg, var(--hc-color-neutral-200) 0%, var(--hc-color-neutral-100) 100%);
    }

    .header::before {
      content: '';
      position: absolute;
      top: -60px;
      right: -60px;
      width: 300px;
      height: 300px;
      background: radial-gradient(circle, rgba(108, 99, 255, 0.15) 0%, transparent 70%);
      pointer-events: none;
    }

    .header-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: rgba(89, 129, 227, 0.15);
      border: 1px solid rgba(89, 129, 227, 0.3);
      color: var(--hc-color-primary-500);
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      padding: 4px 12px;
      border-radius: 20px;
      margin-bottom: 16px;
    }

    .header h1 {
      font-size: 32px;
      font-weight: 700;
      letter-spacing: -0.5px;
      color: var(--heading);
      margin-bottom: 10px;
    }

    .header h1 span {
      color: var(--accent);
    }

    .header-meta {
      color: var(--muted);
      font-size: 13px;
      display: flex;
      gap: 24px;
      flex-wrap: wrap;
      margin-top: 12px;
    }

    .header-meta span {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    /* CONTAINER */
    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 40px;
    }

    /* STATS BAR */
    .stats-bar {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: 16px;
      margin-bottom: 40px;
    }

    .stat-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 20px;
      text-align: center;
      transition: border-color 0.2s;
    }

    .stat-card:hover {
      border-color: var(--accent);
    }

    .stat-card .value {
      font-size: 32px;
      font-weight: 700;
      color: var(--accent);
      line-height: 1;
      margin-bottom: 6px;
    }

    .stat-card .label {
      font-size: 12px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    /* SECTIONS */
    .section {
      margin-bottom: 48px;
    }

    .section-title {
      font-size: 18px;
      font-weight: 600;
      color: var(--heading);
      margin-bottom: 20px;
      padding-bottom: 12px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .section-title .num {
      background: var(--accent);
      color: var(--heading);
      font-size: 11px;
      font-weight: 700;
      width: 22px;
      height: 22px;
      border-radius: 6px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }

    /* OVERVIEW GRID */
    .overview-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 12px;
    }

    .overview-item {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 16px 20px;
    }

    .overview-item .key {
      font-size: 11px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: 6px;
    }

    .overview-item .val {
      font-size: 14px;
      color: var(--text);
      font-weight: 500;
    }

    .badge-ws {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      background: rgba(81, 193, 195, 0.12);
      border: 1px solid rgba(81, 193, 195, 0.3);
      color: var(--accent2);
      font-size: 12px;
      font-weight: 600;
      padding: 3px 10px;
      border-radius: 20px;
    }

    .badge-robot {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      background: rgba(214, 52, 44, 0.12);
      border: 1px solid rgba(214, 52, 44, 0.3);
      color: var(--danger);
      font-size: 12px;
      font-weight: 600;
      padding: 3px 10px;
      border-radius: 20px;
    }

    /* TABS */
    .tabs {
      display: flex;
      gap: 4px;
      margin-bottom: 16px;
    }

    .tab {
      padding: 8px 18px;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--muted);
      transition: all 0.2s;
    }

    .tab.active,
    .tab:hover {
      background: var(--accent);
      border-color: var(--accent);
      color: var(--heading);
    }

    .tab-content {
      display: none;
    }

    .tab-content.active {
      display: block;
    }

    /* TABLES */
    .table-wrap {
      overflow-x: auto;
      border-radius: 10px;
      border: 1px solid var(--border);
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
    }

    thead tr {
      background: var(--surface2);
    }

    thead th {
      padding: 12px 16px;
      text-align: left;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--muted);
      white-space: nowrap;
    }

    tbody tr {
      border-top: 1px solid var(--border);
      transition: background 0.15s;
    }

    tbody tr:hover {
      background: rgba(89, 129, 227, 0.05);
    }

    tbody td {
      padding: 10px 16px;
      color: var(--text);
    }

    .uf-badge {
      display: inline-block;
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--muted);
      font-size: 11px;
      font-weight: 600;
      padding: 2px 8px;
      border-radius: 4px;
    }

    .uf-badge.SC {
      border-color: var(--hc-color-info-400);
      color: var(--hc-color-info-500);
      background: rgba(89, 129, 227, 0.1);
    }

    .uf-badge.RS {
      border-color: var(--hc-color-secondary-400);
      color: var(--hc-color-secondary-500);
      background: rgba(81, 193, 195, 0.1);
    }

    .uf-badge.PR {
      border-color: var(--hc-color-warning-400);
      color: var(--hc-color-warning-500);
      background: rgba(239, 186, 15, 0.1);
    }

    .uf-badge.MG {
      border-color: #7c5ee2;
      color: #ac93fc;
      background: rgba(124, 94, 226, 0.1);
    }

    .uf-badge.SP {
      border-color: var(--hc-color-danger-400);
      color: var(--hc-color-danger-500);
      background: rgba(214, 52, 44, 0.1);
    }

    .uf-badge.RJ {
      border-color: var(--hc-color-secondary-300);
      color: var(--hc-color-secondary-400);
      background: rgba(10, 144, 144, 0.1);
    }

    .uf-badge.GO {
      border-color: var(--hc-color-success-400);
      color: var(--hc-color-success-500);
      background: rgba(0, 157, 67, 0.1);
    }

    .uf-badge.BA {
      border-color: var(--hc-color-warning-400);
      color: var(--hc-color-warning-500);
      background: rgba(239, 186, 15, 0.1);
    }

    .ibge {
      font-family: menlo, monaco, consolas, 'Liberation Mono', 'Courier New', monospace;
      font-size: 12px;
      color: var(--muted);
    }

    /* SEARCH IN TABLE */
    .search-wrap-table {
      margin-bottom: 12px;
      position: relative;
    }

    .search-wrap-table input {
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 16px 10px 40px;
      color: var(--text);
      font-size: 13px;
      outline: none;
      transition: border-color 0.2s;
    }

    .search-wrap-table input:focus {
      border-color: var(--accent);
    }

    .search-wrap-table input::placeholder {
      color: var(--muted);
    }

    .search-icon {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--muted);
      font-size: 14px;
      pointer-events: none;
    }

    /* REGIME */
    .regime-code {
      font-family: menlo, monaco, consolas, 'Liberation Mono', 'Courier New', monospace;
      font-size: 13px;
      font-weight: 700;
      color: var(--accent);
    }

    .regime-ipm {
      font-family: menlo, monaco, consolas, 'Liberation Mono', 'Courier New', monospace;
      font-size: 13px;
      font-weight: 700;
      color: var(--accent2);
    }

    .regime-fallback {
      color: var(--warn);
    }

    .regime-fallback .regime-ipm {
      color: var(--warn);
    }

    /* ALERTS */
    .alert {
      border-radius: 10px;
      padding: 16px 20px;
      margin: 16px 0;
      display: flex;
      gap: 12px;
      align-items: flex-start;
      font-size: 13px;
      line-height: 1.6;
    }

    .alert-warn {
      background: rgba(239, 186, 15, 0.08);
      border: 1px solid rgba(239, 186, 15, 0.25);
      color: var(--warn);
    }

    .alert-info {
      background: rgba(89, 129, 227, 0.08);
      border: 1px solid rgba(89, 129, 227, 0.25);
      color: var(--accent);
    }

    .alert-ok {
      background: rgba(81, 193, 195, 0.08);
      border: 1px solid rgba(81, 193, 195, 0.25);
      color: var(--accent2);
    }

    .alert-icon {
      font-size: 16px;
      flex-shrink: 0;
      margin-top: 1px;
    }

    /* FEATURES GRID */
    .features-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 12px;
    }

    .feature-item {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 14px 16px;
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 13px;
    }

    .feature-item .icon {
      font-size: 18px;
    }

    .feature-item .feat-label {
      color: var(--muted);
      font-size: 11px;
    }

    .feature-item .feat-val {
      font-weight: 600;
    }

    .feat-yes {
      color: var(--accent2);
    }

    .feat-no {
      color: var(--danger);
    }

    /* PR CARDS */
    .pr-list {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .pr-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 20px 24px;
      position: relative;
      overflow: hidden;
    }

    .pr-card::before {
      content: '';
      position: absolute;
      left: 0;
      top: 0;
      bottom: 0;
      width: 3px;
      background: var(--pr);
    }

    .pr-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 14px;
      flex-wrap: wrap;
    }

    .pr-number {
      font-size: 12px;
      font-weight: 700;
      background: rgba(89, 129, 227, 0.12);
      border: 1px solid rgba(89, 129, 227, 0.3);
      color: var(--pr);
      padding: 3px 10px;
      border-radius: 20px;
    }

    .pr-title {
      font-size: 15px;
      font-weight: 600;
      color: var(--heading);
      flex: 1;
    }

    .pr-date {
      font-size: 12px;
      color: var(--muted);
      white-space: nowrap;
    }

    .pr-meta {
      display: flex;
      gap: 20px;
      flex-wrap: wrap;
      font-size: 13px;
      margin-bottom: 14px;
    }

    .pr-meta-item {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .pr-meta-item .mk {
      font-size: 11px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .pr-meta-item .mv {
      color: var(--text);
      font-weight: 500;
    }

    .pr-approver {
      color: var(--accent2);
    }

    .pr-commits {
      margin-top: 12px;
    }

    .pr-commits-title {
      font-size: 11px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: 8px;
    }

    .commit-item {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      font-size: 12px;
      padding: 8px 12px;
      background: var(--code-bg);
      border-radius: 6px;
      margin-bottom: 6px;
    }

    .commit-sha {
      font-family: menlo, monaco, consolas, 'Liberation Mono', 'Courier New', monospace;
      color: var(--accent);
      font-weight: 700;
      flex-shrink: 0;
    }

    .commit-msg {
      color: var(--text);
    }

    .commit-author {
      color: var(--muted);
      flex-shrink: 0;
    }

    .pr-files {
      margin-top: 10px;
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .file-tag {
      font-family: menlo, monaco, consolas, 'Liberation Mono', 'Courier New', monospace;
      font-size: 11px;
      background: var(--code-bg);
      border: 1px solid var(--border);
      color: var(--muted);
      padding: 3px 8px;
      border-radius: 4px;
    }

    /* CX NOTES */
    .cx-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .cx-item {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 16px 20px;
      display: flex;
      gap: 14px;
    }

    .cx-num {
      background: var(--accent);
      color: var(--heading);
      font-size: 12px;
      font-weight: 700;
      width: 24px;
      height: 24px;
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      margin-top: 1px;
    }

    .cx-title {
      font-weight: 600;
      color: var(--heading);
      margin-bottom: 4px;
      font-size: 14px;
    }

    .cx-body {
      font-size: 13px;
      color: var(--muted);
      line-height: 1.6;
    }

    code {
      font-family: menlo, monaco, consolas, 'Liberation Mono', 'Courier New', monospace;
      background: var(--code-bg);
      border: 1px solid var(--border);
      color: var(--accent2);
      padding: 1px 6px;
      border-radius: 4px;
      font-size: 12px;
    }

    /* FOOTER */
    .footer {
      padding: 24px 40px;
      text-align: center;
      font-size: 12px;
      color: var(--muted);
    }

    /* ── CIDADE DETAIL (legacy styles) ── */
    .cidade-detail .g {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      margin-bottom: 24px;
    }

    @media(max-width:768px) {
      .cidade-detail .g {
        grid-template-columns: 1fr;
      }
    }

    .cidade-detail .c {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 24px;
    }

    .cidade-detail .c h2 {
      font-size: 16px;
      color: var(--text);
      margin-bottom: 16px;
      padding-bottom: 8px;
      border-bottom: 1px solid var(--border);
    }

    .cidade-detail .c.f {
      grid-column: 1/-1;
    }

    .ir {
      display: flex;
      justify-content: space-between;
      padding: 8px 0;
      border-bottom: 1px solid var(--border);
      font-size: 14px;
    }

    .ir:last-child {
      border-bottom: none;
    }

    .il {
      color: var(--muted);
    }

    .iv {
      color: var(--text);
      font-weight: 500;
      text-align: right;
      max-width: 60%;
      word-break: break-all;
    }

    .ub {
      margin-bottom: 16px;
    }

    .ub h3 {
      font-size: 13px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 8px;
    }

    .ui {
      background: var(--code-bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 14px;
      margin-bottom: 6px;
      font-size: 13px;
    }

    .ui .ul {
      color: var(--muted);
      font-size: 11px;
      display: block;
      margin-bottom: 2px;
    }

    .ui .uv {
      color: var(--accent2);
      word-break: break-all;
    }

    .tr {
      background: var(--code-bg);
      border-left: 3px solid var(--accent);
      border-radius: 0 8px 8px 0;
      padding: 16px;
      margin-bottom: 12px;
    }

    .tr h3 {
      font-size: 14px;
      color: var(--accent);
      margin-bottom: 8px;
    }

    .tr p {
      font-size: 13px;
      color: var(--muted);
    }

    .tr .fr {
      font-size: 11px;
      color: var(--muted);
      margin-top: 6px;
      font-style: italic;
    }

    .et {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
    }

    .et th {
      text-align: left;
      color: var(--muted);
      padding: 8px 12px;
      border-bottom: 1px solid var(--border);
      font-weight: 600;
    }

    .et td {
      padding: 8px 12px;
      border-bottom: 1px solid var(--border);
    }

    .et tr:last-child td {
      border-bottom: none;
    }

    .cb {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      margin-top: 12px;
    }

    .ci {
      background: var(--code-bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 14px;
    }

    .ci h4 {
      font-size: 13px;
      color: var(--muted);
      margin-bottom: 8px;
    }

    .badge {
      display: inline-block;
      padding: 3px 10px;
      border-radius: 16px;
      font-size: 11px;
      font-weight: 600;
      margin-top: 4px;
    }

    .b-a {
      background: var(--hc-color-success-400);
      color: #edfff5;
    }

    .b-l {
      background: #6c5200;
      color: var(--hc-color-warning-500);
    }

    .b-r {
      background: var(--hc-color-primary-200);
      color: var(--hc-color-primary-500);
    }

    .hdr {
      border-radius: 16px;
      padding: 32px 40px;
      margin-bottom: 24px;
      border: 1px solid var(--border);
    }

    .hdr h1 {
      font-size: 28px;
      color: var(--heading);
      margin-bottom: 4px;
    }

    .hdr .sub {
      color: var(--muted);
      font-size: 14px;
    }

    /* SKELETON */
    @keyframes shimmer {
      0% {
        background-position: -400px 0;
      }

      100% {
        background-position: 400px 0;
      }
    }

    .skeleton {
      background: linear-gradient(90deg, var(--surface) 25%, var(--surface2) 50%, var(--surface) 75%);
      background-size: 800px 100%;
      animation: shimmer 1.5s infinite ease-in-out;
      border-radius: 8px;
    }

    .skeleton-landing {
      max-width: 600px;
      margin: 80px auto 0;
      padding: 0 24px;
    }

    .skeleton-title {
      height: 28px;
      width: 60%;
      margin: 0 auto 12px;
    }

    .skeleton-subtitle {
      height: 16px;
      width: 40%;
      margin: 0 auto 32px;
    }

    .skeleton-cards {
      display: flex;
      gap: 16px;
      justify-content: center;
    }

    .skeleton-card {
      flex: 1;
      max-width: 240px;
      height: 140px;
      border-radius: 14px;
    }

    .skeleton-search {
      height: 48px;
      max-width: 600px;
      margin: 28px auto 0;
      border-radius: 12px;
    }

    .skeleton-stats {
      height: 16px;
      width: 200px;
    }

    .skeleton-hide {
      display: none;
    }

    /* SCROLLBAR */
    ::-webkit-scrollbar {
      width: 6px;
      height: 6px;
    }

    ::-webkit-scrollbar-track {
      background: var(--bg);
    }

    ::-webkit-scrollbar-thumb {
      background: var(--border);
      border-radius: 3px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: var(--accent);
    }

    /* LOGS TABS */
    .logs-tabs {
      display: flex;
      gap: 0;
      border-bottom: 2px solid var(--border);
      margin-bottom: 24px;
    }

    .logs-tab {
      padding: 12px 24px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      border: none;
      background: transparent;
      color: var(--muted);
      border-bottom: 2px solid transparent;
      margin-bottom: -2px;
      transition: color .2s, border-color .2s;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .logs-tab:hover {
      color: var(--text);
    }

    .logs-tab.active {
      color: var(--accent);
      border-bottom-color: var(--accent);
    }

    .logs-panel {
      display: none;
    }

    .logs-panel.active {
      display: block;
    }

    /* NF-e Negadas clickable items */
    .nfe-clickable {
      cursor: pointer;
      transition: background .15s;
      border-radius: 6px;
      padding: 4px 8px;
      margin: -4px -8px;
    }

    .nfe-clickable:hover {
      background: rgba(89, 129, 227, 0.08);
    }

    /* Modal overlay */
    .modal-overlay {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0, 0, 0, 0.6);
      z-index: 1000;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .modal-overlay.on {
      display: flex;
    }

    .modal-box {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      max-width: 800px;
      width: 100%;
      max-height: 80vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .modal-header {
      padding: 20px 24px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 16px;
    }

    .modal-header h3 {
      font-size: 16px;
      color: var(--heading);
      font-weight: 600;
      line-height: 1.4;
    }

    .modal-header .modal-date {
      font-size: 12px;
      color: var(--muted);
      margin-top: 4px;
    }

    .modal-close {
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--muted);
      width: 32px;
      height: 32px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: background .2s, color .2s;
    }

    .modal-close:hover {
      background: var(--danger);
      color: var(--heading);
    }

    .modal-body {
      padding: 20px 24px;
      overflow-y: auto;
    }

    .modal-body table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
    }

    .modal-body thead th {
      position: sticky;
      top: 0;
      background: var(--surface);
      z-index: 1;
    }

    .modal-loading {
      text-align: center;
      padding: 40px;
      color: var(--muted);
      font-size: 14px;
    }

    .modal-summary {
      font-size: 13px;
      color: var(--muted);
      margin-bottom: 16px;
    }
  </style>
</head>

<body>
  <script src="auth.js"></script>
  <div class="topbar">
    <h1>🏙️ Cidades & Provedores</h1>
    <div class="topbar-right">
      <div class="stats" id="stats">
        <div class="skeleton skeleton-stats">&nbsp;</div>
      </div>
      <button class="theme-toggle" id="themeToggle" title="Alternar tema"
        aria-label="Alternar tema claro/escuro"></button>
    </div>
  </div>

  <div id="skeleton-home">
    <div class="skeleton-landing">
      <div class="skeleton skeleton-title">&nbsp;</div>
      <div class="skeleton skeleton-subtitle">&nbsp;</div>
      <div class="skeleton-cards">
        <div class="skeleton skeleton-card">&nbsp;</div>
        <div class="skeleton skeleton-card">&nbsp;</div>
      </div>
      <div class="skeleton skeleton-search">&nbsp;</div>
    </div>
  </div>

  <div id="home" class="skeleton-hide">
    <div class="landing">
      <h2>O que deseja consultar?</h2>
      <p>Selecione uma opção e busque por nome, código IBGE ou provedor</p>
      <div class="mode-btns">
        <div class="mode-btn" id="btnCidade" onclick="setMode('cidade')">
          <div class="icon">🏙️</div>
          <div class="label">Cidade</div>
          <div class="desc">Busque por nome, UF ou código IBGE</div>
        </div>
        <div class="mode-btn" id="btnProvedor" onclick="setMode('provedor')">
          <div class="icon">🔌</div>
          <div class="label">Provedor</div>
          <div class="desc">Busque por nome do provedor</div>
        </div>
      </div>
    </div>
    <div class="search-area" id="searchArea">
      <div class="search-wrap">
        <input type="text" id="searchInput" placeholder="" autocomplete="off">
        <div class="ac-list" id="acList"></div>
      </div>
      <div class="search-hint" id="searchHint"></div>
    </div>
  </div>

  <div id="detail">
    <div id="dc"></div>
  </div>

  <div id="logs-alteracoes"></div>

  <!-- Modal NF-e Negadas detalhe -->
  <div class="modal-overlay" id="nfeModal">
    <div class="modal-box">
      <div class="modal-header">
        <div>
          <h3 id="nfeModalTitle"></h3>
          <div class="modal-date" id="nfeModalDate"></div>
        </div>
        <button class="modal-close" onclick="fecharModal()" aria-label="Fechar">✕</button>
      </div>
      <div class="modal-body" id="nfeModalBody">
        <div class="modal-loading">Carregando...</div>
      </div>
    </div>
  </div>

  <div class="footer">Análise extraída do código-fonte do app-gw · Abril 2026</div>

  <script src="Cidades/_index.js"></script>
  <script src="Provedores/_index.js"></script>
  <script src="LogsAlteracoes/github-changelog.js"></script>
  <script src="LogsAlteracoes/jira-tickets-changelog.js"></script>
  <script src="LogsAlteracoes/nfe-negadas-changelog.js"></script>
  <script>
    /* ── Skeleton → Content ── */
    (function () {
      document.getElementById('skeleton-home').style.display = 'none';
      document.getElementById('home').classList.remove('skeleton-hide');
    })();
    const home = document.getElementById('home');
    const detailEl = document.getElementById('detail');
    const dc = document.getElementById('dc');
    const logsEl = document.getElementById('logs-alteracoes');
    const stats = document.getElementById('stats');
    const searchArea = document.getElementById('searchArea');
    const searchInput = document.getElementById('searchInput');
    const acList = document.getElementById('acList');
    const searchHint = document.getElementById('searchHint');
    let mode = '';
    let acIdx = -1;

    stats.textContent = cidadesIndex.length + ' cidades · ' + provedoresIndex.length + ' provedores';

    function setMode(m) {
      mode = m;
      document.getElementById('btnCidade').classList.toggle('active', m === 'cidade');
      document.getElementById('btnProvedor').classList.toggle('active', m === 'provedor');
      searchArea.classList.add('on');
      searchInput.value = '';
      acList.innerHTML = '';
      acList.classList.remove('on');
      acIdx = -1;
      if (m === 'cidade') {
        searchInput.placeholder = 'Digite nome da cidade, UF ou código IBGE...';
        searchHint.textContent = 'Ex: "Belo Horizonte", "SC", "3106200"';
      } else {
        searchInput.placeholder = 'Digite o nome do provedor...';
        searchHint.textContent = 'Ex: "IPM", "GissOnline", "NfseNacional"';
      }
      searchInput.focus();
    }

    /* ── Autocomplete ── */
    searchInput.addEventListener('input', () => { acIdx = -1; renderAc(); });
    searchInput.addEventListener('keydown', e => {
      const items = acList.querySelectorAll('.ac-item');
      if (!items.length) return;
      if (e.key === 'ArrowDown') { e.preventDefault(); acIdx = Math.min(acIdx + 1, items.length - 1); highlightAc(items); }
      else if (e.key === 'ArrowUp') { e.preventDefault(); acIdx = Math.max(acIdx - 1, 0); highlightAc(items); }
      else if (e.key === 'Enter' && acIdx >= 0) { e.preventDefault(); items[acIdx].click(); }
      else if (e.key === 'Escape') { acList.classList.remove('on'); }
    });
    document.addEventListener('click', e => { if (!searchArea.contains(e.target)) acList.classList.remove('on'); });

    function highlightAc(items) {
      items.forEach((it, i) => it.classList.toggle('sel', i === acIdx));
      if (items[acIdx]) items[acIdx].scrollIntoView({ block: 'nearest' });
    }

    function hl(text, q) {
      if (!q) return text;
      const re = new RegExp('(' + q.replace(/[.*+?^${}()|[\]\\]/g, '\\$&') + ')', 'gi');
      return text.replace(re, '<mark>$1</mark>');
    }

    function renderAc() {
      const q = searchInput.value.trim().toLowerCase();
      if (!q) { acList.classList.remove('on'); acList.innerHTML = ''; return; }
      let results = [];
      if (mode === 'cidade') {
        results = cidadesIndex.filter(c =>
          c.nome.toLowerCase().includes(q) || c.uf.toLowerCase().includes(q) ||
          c.ibge.includes(q) || (c.nome.toLowerCase() + '/' + c.uf.toLowerCase()).includes(q)
        ).sort((a, b) => a.nome.localeCompare(b.nome)).slice(0, 15);
        acList.innerHTML = results.map(c =>
          '<div class="ac-item" onclick="abrirCidade(\'' + c.id + '\')">' +
          '<div class="ac-name">' + hl(c.nome, q) + ' / ' + hl(c.uf, q) + '</div>' +
          '<div class="ac-sub">IBGE ' + hl(c.ibge, q) + ' · ' + c.provedor + '</div></div>'
        ).join('');
      } else {
        results = provedoresIndex.filter(p =>
          p.nome.toLowerCase().includes(q) || p.empresa.toLowerCase().includes(q) ||
          p.versoes.some(v => v.toLowerCase().includes(q))
        ).sort((a, b) => a.nome.localeCompare(b.nome)).slice(0, 15);
        acList.innerHTML = results.map(p =>
          '<div class="ac-item" onclick="abrirProvedor(\'' + p.id + '\')">' +
          '<div class="ac-name">🔌 ' + hl(p.nome, q) + '</div>' +
          '<div class="ac-sub">' + hl(p.empresa, q) + ' · ' + p.municipios + ' municípios</div></div>'
        ).join('');
      }
      if (!results.length) {
        acList.innerHTML = '<div class="ac-item"><div class="ac-sub">Nenhum resultado encontrado</div></div>';
      }
      acList.classList.add('on');
    }

    /* ── Detail: Cidade ── */
    function abrirCidade(id) {
      var script = document.createElement('script');
      script.src = 'Cidades/' + id + '.js';
      script.onload = function () {
        renderCidade(cidadeDetalhe);
        document.head.removeChild(script);
      };
      script.onerror = function () {
        dc.innerHTML = '<div class="container"><div class="alert alert-warn"><span class="alert-icon">⚠️</span><span>Arquivo de detalhe não encontrado: Cidades/' + id + '.js</span></div></div>';
        home.classList.add('off'); detailEl.classList.add('on'); if (logsEl) logsEl.style.display = 'none';
        document.head.removeChild(script);
      };
      document.head.appendChild(script);
    }

    function renderCidade(c) {
      let h = '';
      var secNum = 0;

      // HEADER (dossiê style)
      h += '<div class="header">';
      h += '<button type="button" class="back-btn" onclick="voltar()">← Voltar</button>';
      h += '<div class="header-badge">📋 Dossiê Municipal · eNotas Gateway</div>';
      h += '<h1><span>' + c.nome + '</span> / ' + c.uf + '</h1>';
      h += '<div class="header-meta">';
      h += '<span>🔢 IBGE: ' + c.ibge + '</span>';
      h += '<span>📌 Constante: ' + c.constante + '</span>';
      h += '<span>📅 Gerado em: março/2026</span>';
      h += '</div></div>';

      h += '<div class="container">';

      // STATS BAR
      var nTrat = c.tratamentos ? c.tratamentos.length : 0;
      var nCaract = c.caracteristicas ? c.caracteristicas.length : 0;
      h += '<div class="stats-bar">';
      h += statCard(c.provedorAtual.webService ? 'WS' : 'Robô', 'Integração');
      h += statCard(nCaract || '—', 'Características');
      h += statCard(nTrat, 'Tratamentos');
      h += '</div>';

      // SECTION 1 — Visão Geral
      secNum++;
      h += '<div class="section">';
      h += sectionTitle(secNum, 'Visão Geral do Município');
      h += '<div class="overview-grid">';
      h += ovItem('Município', c.nome);
      h += ovItem('UF', '<span class="uf-badge ' + c.uf + '">' + c.uf + '</span>');
      h += ovItem('Código IBGE', '<span class="ibge">' + c.ibge + '</span>');
      h += ovItem('Provedor Atual', '<span class="badge-ws">⚡ ' + c.provedorAtual.nome + '</span>');
      h += ovItem('WebService', c.provedorAtual.webService ? '<span style="color:var(--accent2)">✓ Sim</span>' : '<span style="color:var(--danger)">✗ Não</span>');
      h += ovItem('Robô', c.provedorAtual.robo ? '<span style="color:var(--warn)">⚠ Sim</span>' : '<span class="badge-robot">✗ Não</span>');
      if (c.provedorAtual.versaoAbrasf) h += ovItem('Versão ABRASF', c.provedorAtual.versaoAbrasf);
      if (c.provedorAtual.namespace) h += ovItem('Namespace', '<code>' + c.provedorAtual.namespace + '</code>');
      h += ovItem('codigoNoProvedor', c.provedorAtual.codigoNoProvedor ? '<code>' + c.provedorAtual.codigoNoProvedor + '</code>' : '<span style="color:var(--muted)">(vazio)</span>');
      h += '</div></div>';

    /* ── Detail: Provedor (Dossiê Layout) ── */
    function abrirProvedor(id) {
      var script = document.createElement('script');
      script.src = 'Provedores/' + id + '.js';
      script.onload = function () {
        renderProvedor(provedorDetalhe);
        document.head.removeChild(script);
      };
      script.onerror = function () {
        dc.innerHTML = '<div class="container"><div class="alert alert-warn"><span class="alert-icon">⚠️</span><span>Arquivo de detalhe não encontrado: Provedores/' + id + '.js</span></div></div>';
        home.classList.add('off'); detailEl.classList.add('on'); if (logsEl) logsEl.style.display = 'none';
        document.head.removeChild(script);
      };
      document.head.appendChild(script);
    }

          { key: 'suportaEmissaoParalela', label: 'Emissão Paralela' },
          { key: 'enviaEmailCliente', label: 'Envia Email ao Cliente' },
          { key: 'numeroRpsDeveSerSequencial', label: 'RPS Sequencial' },
          { key: 'numeroLoteDeveSerSequencial', label: 'Lote Sequencial' },
          { key: 'suportaConsultaSequencialRps', label: 'Consulta Sequencial RPS' },
        ];
        h += '<div class="features-grid" style="margin-top:16px">';
        provFlags.forEach(function (f) {
          if (cfg[f.key] === undefined || cfg[f.key] === null) return;
          var yes = cfg[f.key] === true;
          h += '<div class="feature-item"><span class="icon">' + (yes ? '✅' : '❌') + '</span><div><div class="feat-label">' + f.label + '</div><div class="feat-val ' + (yes ? 'feat-yes' : 'feat-no') + '">' + (yes ? 'Sim' : 'Não') + '</div></div></div>';
        });
        h += '</div>';

        // HelpTipoAutenticacao
        if (cfg.helpTipoAutenticacao) {
          var ha = cfg.helpTipoAutenticacao;
          var haItems = ['certificadoDigital', 'usuario', 'senha', 'token', 'fraseSecreta'].filter(function (k) { return ha[k]; });
          if (haItems.length) {
            h += '<h3 style="font-size:14px;color:var(--muted);font-weight:600;margin:24px 0 12px;text-transform:uppercase;letter-spacing:0.06em;">Autenticação — Textos de Ajuda</h3>';
            h += '<div class="cx-list">';
            haItems.forEach(function (k) {
              var label = k.replace(/([A-Z])/g, ' $1').replace(/^./, function (s) { return s.toUpperCase(); });
              h += '<div class="cx-item"><div class="cx-num" style="background:var(--accent2)">🔑</div><div><div class="cx-title">' + label + '</div><div class="cx-body">' + ha[k].replace(/\\r\\n/g, '<br/>').replace(/\\n/g, '<br/>') + '</div></div></div>';
            });
            h += '</div>';
          }
        }

        // Helps gerais
        var helps = [
          { key: 'helpInscricaoMunicipal', label: 'Inscrição Municipal' },
          { key: 'helpRegimeEspecialTributacao', label: 'Regime Especial Tributação' },
          { key: 'helpCodigoServicoMunicipal', label: 'Código Serviço Municipal' },
          { key: 'helpDescricaoServico', label: 'Descrição Serviço' },
          { key: 'helpCNAE', label: 'CNAE' },
          { key: 'helpItemListaServico', label: 'Item Lista Serviço' },
          { key: 'helpAEDF', label: 'AEDF' },
        ];
        var hasHelps = helps.some(function (hp) { return cfg[hp.key]; });
        if (hasHelps) {
          h += '<h3 style="font-size:14px;color:var(--muted);font-weight:600;margin:24px 0 12px;text-transform:uppercase;letter-spacing:0.06em;">Textos de Ajuda (Help)</h3>';
          h += '<div class="cx-list">';
          helps.forEach(function (hp) {
            if (!cfg[hp.key]) return;
            var txt = cfg[hp.key].replace(/\\r\\n/g, '<br/>').replace(/\\n/g, '<br/>');
            h += '<div class="cx-item"><div class="cx-num" style="background:var(--accent2)">?</div><div><div class="cx-title">' + hp.label + '</div><div class="cx-body">' + txt + '</div></div></div>';
          });
          h += '</div>';
        }

        // Regimes Especiais de Tributação
        if (cfg.regimesEspecialTributacao && cfg.regimesEspecialTributacao.length) {
          h += '<h3 style="font-size:14px;color:var(--muted);font-weight:600;margin:24px 0 12px;text-transform:uppercase;letter-spacing:0.06em;">Regimes Especiais de Tributação</h3>';
          h += '<div class="table-wrap"><table><thead><tr><th>Código</th><th>Nome</th></tr></thead><tbody>';
          cfg.regimesEspecialTributacao.forEach(function (r) {
            h += '<tr><td><span class="regime-code">' + r.codigo + '</span></td><td>' + r.nome + '</td></tr>';
          });
          h += '</tbody></table></div>';
        }

        // Naturezas de Operação
        if (cfg.naturezasOperacao && cfg.naturezasOperacao.length) {
          h += '<h3 style="font-size:14px;color:var(--muted);font-weight:600;margin:24px 0 12px;text-transform:uppercase;letter-spacing:0.06em;">Naturezas de Operação</h3>';
          h += '<div class="table-wrap"><table><thead><tr><th>Código</th><th>Nome</th></tr></thead><tbody>';
          cfg.naturezasOperacao.forEach(function (n) {
            h += '<tr><td><span class="regime-code">' + n.codigo + '</span></td><td>' + n.nome + '</td></tr>';
          });
          h += '</tbody></table></div>';
        }

        h += '</div>';
      }

      // SECTION — Regras por Município
      if (p.tratamentosEspeciais && p.tratamentosEspeciais.length) {
        secNum++;
        h += '<div class="section">';
        h += sectionTitle(secNum, 'Regras Específicas por Município');
        p.tratamentosEspeciais.forEach((t, i) => {
          h += '<div class="alert alert-info" style="margin-bottom:8px"><span class="alert-icon">📌</span><div><strong>' + (i + 1) + '. ' + t.titulo + '</strong><br/><span style="color:var(--text)">' + t.descricao + '</span>';
          if (t.municipios) h += '<br/><span style="margin-top:6px;display:inline-block">' + t.municipios.map(m => '<code>' + m + '</code>').join(' ') + '</span>';
          if (t.arquivos) h += '<br/><span style="color:var(--muted);font-size:11px;font-style:italic">' + t.arquivos.map(a => '📁 ' + a).join(' · ') + '</span>';
          h += '</div></div>';
        });
        h += '</div>';
      }

      // SECTION — PRs
      if (p.prs && p.prs.length) {
        secNum++;
        h += '<div class="section">';
        h += sectionTitle(secNum, 'Histórico de Alterações — Últimos ' + p.prs.length + ' PRs');
        h += '<div class="pr-list">';
        p.prs.forEach(pr => {
          h += '<div class="pr-card"><div class="pr-header"><div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap">';
          h += '<span class="pr-number">PR #' + pr.numero + '</span>';
          h += '<span class="pr-title">' + pr.titulo + '</span></div>';
          h += '<span class="pr-date">📅 ' + pr.data + '</span></div>';
          h += '<div class="pr-meta"><div class="pr-meta-item"><span class="mk">Autor</span><span class="mv">' + pr.autor + '</span></div>';
          h += '<div class="pr-meta-item"><span class="mk">Aprovadores</span><span class="mv' + (pr.aprovadores ? ' pr-approver' : '') + '">' + (pr.aprovadores || '<span style="color:var(--muted);font-style:italic">Nenhum registrado</span>') + '</span></div></div>';
          h += '<div class="pr-files">' + pr.arquivos.map(f => '<span class="file-tag">' + f + '</span>').join('') + '</div>';
          h += '<div class="pr-commits"><div class="pr-commits-title">Commits</div>';
          pr.commits.forEach(c => {
            h += '<div class="commit-item"><span class="commit-sha">' + c.sha + '</span><span class="commit-msg">' + c.msg + '</span><span class="commit-author">— ' + c.autor + '</span></div>';
          });
          h += '</div></div>';
        });
        h += '</div></div>';
      }

      // SECTION — CX Notes
      if (p.observacoesCX && p.observacoesCX.length) {
        secNum++;
        h += '<div class="section">';
        h += sectionTitle(secNum, 'Observações para CX');
        h += '<div class="cx-list">';
        p.observacoesCX.forEach((cx, i) => {
          h += '<div class="cx-item"><div class="cx-num">' + (i + 1) + '</div><div><div class="cx-title">' + cx.titulo + '</div><div class="cx-body">' + cx.corpo + '</div></div></div>';
        });
        h += '</div></div>';
      }

      h += '</div>'; // container
      dc.innerHTML = h;
      home.classList.add('off'); detailEl.classList.add('on'); if (logsEl) logsEl.style.display = 'none'; window.scrollTo(0, 0);
    }

    /* ── Provedor Tab/Filter helpers ── */
    function switchProvTab(btn, tab) {
      btn.closest('.section').querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      btn.classList.add('active');
      btn.closest('.section').querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
      document.getElementById('prov-tab-' + tab).classList.add('active');
    }
    function filterProvTable(tab) {
      var input = document.getElementById('prov-search-' + tab).value.toLowerCase();
      var rows = document.querySelectorAll('#prov-table-' + tab + ' tbody tr');
      rows.forEach(row => { row.style.display = row.textContent.toLowerCase().includes(input) ? '' : 'none'; });
    }

    /* ── Helpers ── */
    function voltar() { detailEl.classList.remove('on'); home.classList.remove('off'); if (logsEl) logsEl.style.display = ''; window.scrollTo(0, 0); }
    function row(l, v) { return '<div class="ir"><span class="il">' + l + '</span><span class="iv">' + v + '</span></div>'; }
    function statCard(val, label) { return '<div class="stat-card"><div class="value">' + val + '</div><div class="label">' + label + '</div></div>'; }
    function sectionTitle(num, text) { return '<div class="section-title"><span class="num">' + num + '</span> ' + text + '</div>'; }
    function ovItem(key, val) { return '<div class="overview-item"><div class="key">' + key + '</div><div class="val">' + val + '</div></div>'; }
    function buildUrlSection(title, urls) {
      var h = '<h3 style="font-size:14px;color:var(--muted);font-weight:600;margin:12px 0 8px;text-transform:uppercase;letter-spacing:0.06em">' + title + '</h3>';
      ['homologacao', 'producao'].forEach(amb => {
        if (!urls || !urls[amb]) return;
        h += '<div style="margin-bottom:12px"><div style="font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:0.06em;margin-bottom:6px">' + (amb === 'homologacao' ? 'Homologação' : 'Produção') + '</div>';
        Object.entries(urls[amb]).forEach(([k, v]) => {
          var label = k.replace(/([A-Z])/g, ' $1').replace(/^./, s => s.toUpperCase());
          h += '<div style="background:var(--code-bg);border:1px solid var(--border);border-radius:6px;padding:8px 12px;margin-bottom:4px;font-size:12px"><span style="color:var(--muted);font-size:11px;display:block;margin-bottom:2px">' + label + '</span><code style="border:none;background:none;padding:0;color:var(--accent2);font-size:12px">' + v + '</code></div>';
        });
        h += '</div>';
      });
      return h;
    }
    function urlBlock(title, urls) {
      var h = '<div class="ci"><h4>' + title + '</h4>';
      ['homologacao', 'producao'].forEach(amb => {
        if (!urls[amb]) return;
        h += '<div class="ub"><h3>' + (amb === 'homologacao' ? 'Homologação' : 'Produção') + '</h3>';
        Object.entries(urls[amb]).forEach(([k, v]) => {
          var label = k.replace(/([A-Z])/g, ' $1').replace(/^./, s => s.toUpperCase());
          h += '<div class="ui"><span class="ul">' + label + '</span><span class="uv">' + v + '</span></div>';
        });
        h += '</div>';
      });
      return h + '</div>';
    }

    /* ── Logs de Alterações (Tabs laterais) ── */
    (function () {
      var hasChangelog = typeof changelogData !== 'undefined' && changelogData.length;
      var hasJira = typeof jiraChangelogData !== 'undefined' && jiraChangelogData.length;
      var hasNegadas = typeof nfeNegadasData !== 'undefined' && nfeNegadasData.length;
      if (!hasChangelog && !hasJira && !hasNegadas) return;
      var el = document.getElementById('logs-alteracoes');
      if (!el) return;

      function renderItems(data, isNegadas) {
        var h = '<div class="pr-list">';
        data.forEach(function (r) {
          h += '<div class="pr-card"><div class="pr-header">';
          h += '<span class="pr-number">' + r.tag + '</span>';
          h += '<span class="pr-title">' + r.titulo + '</span>';
          h += '<span class="pr-date">' + r.data + '</span></div>';
          h += '<div style="font-size:13px;color:var(--text);line-height:1.8">';
          r.itens.forEach(function (it) {
            var txt = it.texto.replace(/\b(CE-\d+)\b/g, '<a href="https://hotmart.atlassian.net/browse/$1" target="_blank" style="color:var(--pr);text-decoration:none;font-weight:500">$1</a>');
            if (isNegadas) {
              var dataIso = r.data.split('/').reverse().join('-');
              var enc = encodeURIComponent(it.destaque);
              h += '<p class="nfe-clickable" onclick="abrirModalNfe(\'' + dataIso + '\',\'' + enc + '\',\'' + r.data + '\')">' + it.icon + ' <span style="color:var(--accent2);font-weight:600">' + it.destaque + ':</span> ' + txt + ' <span style="font-size:11px;color:var(--muted)">🔍</span></p>';
            } else {
              h += '<p>' + it.icon + ' <span style="color:var(--accent2);font-weight:600">' + it.destaque + ':</span> ' + txt + '</p>';
            }
          });
          h += '</div></div>';
        });
        h += '</div>';
        return h;
      }

      function dateRange(data) {
        return data[data.length - 1].data + ' – ' + data[0].data;
      }

      var h = '<div style="max-width:1200px;margin:0 auto;padding:40px;">';
      h += '<div class="logs-tabs">';
      if (hasChangelog) {
        h += '<button class="logs-tab active" data-panel="panel-changelog">📦 Últimas Atualizações</button>';
      }
      if (hasJira) {
        h += '<button class="logs-tab' + (hasChangelog ? '' : ' active') + '" data-panel="panel-jira">🎫 Tickets Resolvidos (CE)</button>';
      }
      if (hasNegadas) {
        h += '<button class="logs-tab' + (!hasChangelog && !hasJira ? ' active' : '') + '" data-panel="panel-negadas">❌ NF-e Negadas</button>';
      }
      h += '</div>';
      if (hasChangelog) {
        h += '<div class="logs-panel active" id="panel-changelog">' + renderItems(changelogData) + '</div>';
      }
      if (hasJira) {
        h += '<div class="logs-panel' + (hasChangelog ? '' : ' active') + '" id="panel-jira">' + renderItems(jiraChangelogData) + '</div>';
      }
      if (hasNegadas) {
        h += '<div class="logs-panel' + (!hasChangelog && !hasJira ? ' active' : '') + '" id="panel-negadas">' + renderItems(nfeNegadasData, true) + '</div>';
      }
      h += '</div>';
      el.innerHTML = h;

      var tabs = el.querySelectorAll('.logs-tab');
      tabs.forEach(function (tab) {
        tab.addEventListener('click', function () {
          tabs.forEach(function (t) { t.classList.remove('active'); });
          el.querySelectorAll('.logs-panel').forEach(function (p) { p.classList.remove('active'); });
          tab.classList.add('active');
          var panel = document.getElementById(tab.getAttribute('data-panel'));
          if (panel) panel.classList.add('active');
        });
      });
    })();

    /* ── Modal NF-e Negadas ── */
    var nfeCache = {};
    function fecharModal() {
      document.getElementById('nfeModal').classList.remove('on');
    }
    document.getElementById('nfeModal').addEventListener('click', function (e) {
      if (e.target === this) fecharModal();
    });
    document.addEventListener('keydown', function (e) {
      if (e.key === 'Escape') fecharModal();
    });

    function extrairMensagem(motivo) {
      try {
        var obj = JSON.parse(motivo);
        var msg = obj.mensagemErro || '';
        return msg.replace(/<[^>]+>/g, '').replace(/\\r\\n/g, ' ').replace(/\r\n/g, ' ').trim();
      } catch (e) { return motivo; }
    }

    function normalizarTexto(t) {
      return t.toLowerCase()
        .normalize('NFD').replace(/[\u0300-\u036f]/g, '')
        .replace(/[^a-z0-9 ]/g, ' ')
        .replace(/\s+/g, ' ')
        .trim();
    }

    function abrirModalNfe(dataIso, destaqueEnc, dataDisplay) {
      var destaque = decodeURIComponent(destaqueEnc);
      var modal = document.getElementById('nfeModal');
      var title = document.getElementById('nfeModalTitle');
      var dateEl = document.getElementById('nfeModalDate');
      var body = document.getElementById('nfeModalBody');

      title.textContent = destaque;
      dateEl.textContent = dataDisplay;
      body.innerHTML = '<div class="modal-loading">Carregando dados...</div>';
      modal.classList.add('on');

      if (nfeCache[dataIso]) {
        renderModalData(nfeCache[dataIso], destaque, body);
        return;
      }

      fetch('LogsAlteracoes/nfe-negadas-detalhe/' + dataIso + '.json')
        .then(function (r) { return r.json(); })
        .then(function (data) {
          nfeCache[dataIso] = data;
          renderModalData(data, destaque, body);
        })
        .catch(function () {
          body.innerHTML = '<div class="modal-loading" style="color:var(--danger)">Erro ao carregar dados de detalhe para ' + dataIso + '</div>';
        });
    }

    function renderModalData(allData, destaque, body) {
      var destaqueNorm = normalizarTexto(destaque);
      var keywords = destaqueNorm.split(' ').filter(function (w) { return w.length > 2; });

      var filtered = allData.filter(function (row) {
        var msg = normalizarTexto(extrairMensagem(row.motivo_situacao));
        var matchCount = 0;
        for (var i = 0; i < keywords.length; i++) {
          if (msg.indexOf(keywords[i]) !== -1) matchCount++;
        }
        return matchCount >= Math.max(2, Math.floor(keywords.length * 0.5));
      });

      if (!filtered.length) {
        body.innerHTML = '<div class="modal-loading">Nenhuma empresa encontrada para este motivo.</div>';
        return;
      }

      // Aggregate by empresa
      var empresaMap = {};
      filtered.forEach(function (row) {
        var key = row.empresa_id;
        if (!empresaMap[key]) {
          empresaMap[key] = { id: row.empresa_id, razao: row.razao_social, qtd: 0 };
        }
        empresaMap[key].qtd += parseInt(row.qtd) || 1;
      });

      var empresas = Object.values(empresaMap).sort(function (a, b) { return b.qtd - a.qtd; });
      var totalNotas = empresas.reduce(function (s, e) { return s + e.qtd; }, 0);

      var h = '<div class="modal-summary">' + empresas.length + ' empresas · ' + totalNotas.toLocaleString('pt-BR') + ' notas no total</div>';
      h += '<div class="table-wrap"><table><thead><tr><th>#</th><th>ID Empresa</th><th style="text-align:right">Qtd Notas</th></tr></thead><tbody>';
      empresas.forEach(function (e, i) {
        h += '<tr><td>' + (i + 1) + '</td><td><code style="font-size:12px;letter-spacing:0.5px;padding:4px 10px">' + e.id + '</code></td><td style="text-align:right;font-weight:600;color:var(--accent)">' + e.qtd.toLocaleString('pt-BR') + '</td></tr>';
      });
      h += '</tbody></table></div>';
      body.innerHTML = h;
    }

    /* ── Theme Toggle ── */
    (function () {
      var saved = localStorage.getItem('theme');
      if (saved === 'dark') document.documentElement.classList.remove('light');
      else if (saved !== 'light') document.documentElement.classList.add('light');
      document.getElementById('themeToggle').addEventListener('click', function () {
        document.documentElement.classList.toggle('light');
        localStorage.setItem('theme', document.documentElement.classList.contains('light') ? 'light' : 'dark');
      });
    })();
  </script>
</body>

</html>
