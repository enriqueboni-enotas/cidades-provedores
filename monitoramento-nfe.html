<!DOCTYPE html>
<html lang="pt-BR" class="light">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Monitoramento de Filas NFe — eNotas</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Nunito+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg: #141414;
      --surface: #1E1E1E;
      --surface2: #2A2A2A;
      --border: #333;
      --accent: #F04E23;
      --accent2: #32363b;
      --text: #E0E0E0;
      --muted: #8A8A8A;
      --heading: #FFFFFF;
      --code-bg: #1A1A1A;
      --danger: #d6342c;
      --success: #009d43;
      --warn: #efba0f;
    }

    html.light {
      --bg: #F5F5F0;
      --surface: #FFFFFF;
      --surface2: #F0F0EB;
      --border: #E0DED8;
      --accent: #F04E23;
      --accent2: #32363b;
      --text: #32363b;
      --muted: #707780;
      --heading: #0D0D0D;
      --code-bg: #F8F8F5;
      --danger: #d6342c;
      --success: #009d43;
      --warn: #efba0f;
    }

    body {
      font-family: 'Nunito Sans', -apple-system, blinkmacsystemfont, 'Segoe UI', helvetica, arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
      font-size: 15px;
      min-height: 100vh;
    }

    .topbar {
      background: #FFFFFF;
      border-bottom: 1px solid #E0DED8;
      padding: 0 32px;
      height: 60px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    html:not(.light) .topbar {
      background: #1A1A1A;
      border-bottom-color: #2E2E2E
    }

    .topbar-left {
      display: flex;
      align-items: center;
      gap: 12px
    }

    .hotmart-logo {
      height: 28px;
      width: auto
    }

    .enotas-logo {
      height: 22px;
      width: auto
    }

    html:not(.light) .hotmart-logo,
    html:not(.light) .enotas-logo {
      filter: brightness(0) invert(1)
    }

    .topbar-divider {
      width: 1px;
      height: 28px;
      background: #E0DED8
    }

    html:not(.light) .topbar-divider {
      background: #444
    }

    .topbar h1 {
      font-size: 15px;
      font-weight: 600;
      color: #32363b;
      letter-spacing: -0.2px
    }

    html:not(.light) .topbar h1 {
      color: #E0E0E0
    }

    .topbar-right {
      display: flex;
      align-items: center;
      gap: 16px
    }

    .nav-link {
      font-size: 13px;
      color: var(--muted);
      text-decoration: none;
      transition: color .2s
    }

    .nav-link:hover {
      color: var(--accent)
    }

    .nav-link-home {
      font-size: 13px;
      color: var(--muted);
      text-decoration: none;
      transition: color .2s;
      white-space: nowrap
    }

    .nav-link-home:hover {
      color: var(--accent)
    }

    .enotas-wrap {
      display: flex;
      align-items: center;
      text-decoration: none
    }

    .show-mobile {
      display: none
    }

    .hide-mobile {
      display: inline
    }

    .theme-toggle {
      background: rgba(255, 255, 255, 0.1);
      border: 1px solid rgba(255, 255, 255, 0.15);
      border-radius: 20px;
      width: 48px;
      height: 26px;
      cursor: pointer;
      position: relative;
      transition: background .3s, border-color .3s;
      flex-shrink: 0;
    }

    html.light .theme-toggle {
      background: #E0DED8;
      border-color: #C8C5BC
    }

    .theme-toggle::after {
      content: '';
      position: absolute;
      top: 3px;
      left: 3px;
      width: 20px;
      height: 20px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.2);
      transition: transform .3s, background .3s;
    }

    html.light .theme-toggle::after {
      transform: translateX(22px);
      background: #32363b
    }

    html:not(.light) .theme-toggle {
      background: #333;
      border-color: #444
    }

    html:not(.light) .theme-toggle::after {
      background: #555
    }

    /* Layout */
    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 24px 40px 40px
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px
    }

    .panel {
      padding: 24px
    }

    .panel-title {
      font-size: 14px;
      font-weight: 600;
      color: var(--heading);
      margin-bottom: 16px;
      padding-bottom: 10px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .panel-title .badge-count {
      font-size: 11px;
      background: var(--surface2);
      color: var(--muted);
      padding: 2px 8px;
      border-radius: 10px;
      font-weight: 600;
    }

    .ts-bar {
      font-size: 12px;
      color: var(--muted);
      margin-bottom: 16px
    }

    /* Stats row */
    .stats-row {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 12px;
      margin-bottom: 28px
    }

    .stat-card {
      text-align: center;
      padding: 18px 12px
    }

    .stat-val {
      font-size: 28px;
      font-weight: 700;
      color: var(--accent);
      line-height: 1
    }

    .stat-label {
      font-size: 11px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: .06em;
      margin-top: 6px
    }

    .stat-sub {
      font-size: 11px;
      color: var(--muted);
      margin-top: 2px
    }

    /* Grid */
    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px
    }

    .full {
      grid-column: 1/-1
    }

    .donut-grid {
      grid-template-columns: 280px 1fr;
      gap: 24px
    }

    .emp-mun-grid {
      grid-template-columns: 1fr 1fr;
      gap: 20px
    }

    /* Horizontal bars */
    .bar-chart {
      display: flex;
      flex-direction: column;
      gap: 5px
    }

    .hbar-row {
      display: flex;
      align-items: center;
      gap: 8px
    }

    .hbar-label {
      width: 130px;
      flex-shrink: 0;
      font-size: 12px;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      text-align: right;
    }

    .hbar-track {
      flex: 1;
      height: 20px;
      background: var(--surface2);
      border-radius: 4px;
      overflow: hidden;
      position: relative
    }

    .hbar-fill {
      height: 100%;
      border-radius: 4px;
      transition: width .4s ease;
      min-width: 2px
    }

    .hbar-fill.accent {
      background: var(--accent)
    }

    .hbar-fill.danger {
      background: var(--danger)
    }

    .hbar-fill.warn {
      background: var(--warn)
    }

    .hbar-fill.success {
      background: var(--success)
    }

    .hbar-fill.muted {
      background: var(--muted)
    }

    .hbar-val {
      width: 70px;
      flex-shrink: 0;
      font-size: 12px;
      font-weight: 600;
      color: var(--accent);
      text-align: right
    }

    /* Tables */
    .table-wrap {
      overflow-x: auto;
      border-radius: 8px;
      border: 1px solid var(--border)
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px
    }

    thead tr {
      background: var(--surface2)
    }

    thead th {
      padding: 10px 14px;
      text-align: left;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: .06em;
      color: var(--muted);
      white-space: nowrap;
      cursor: pointer;
      user-select: none;
      position: relative;
    }

    thead th:hover {
      color: var(--accent)
    }

    thead th .sort-arrow {
      font-size: 10px;
      margin-left: 4px;
      opacity: 0.4
    }

    thead th.sorted .sort-arrow {
      opacity: 1;
      color: var(--accent)
    }

    tbody tr {
      border-top: 1px solid var(--border);
      transition: background .15s
    }

    tbody tr:hover {
      background: rgba(240, 78, 35, 0.04)
    }

    tbody td {
      padding: 8px 14px;
      color: var(--text)
    }

    /* Search in table */
    .filter-input {
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 8px 14px;
      color: var(--text);
      font-size: 13px;
      outline: none;
      margin-bottom: 12px;
      transition: border-color .2s;
    }

    .filter-input:focus {
      border-color: var(--accent)
    }

    .filter-input::placeholder {
      color: var(--muted)
    }

    /* Severity dots */
    .dot {
      display: inline-block;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      margin-right: 6px
    }

    .dot-danger {
      background: var(--danger)
    }

    .dot-warn {
      background: var(--warn)
    }

    .dot-ok {
      background: var(--success)
    }

    .dot-muted {
      background: var(--muted)
    }

    /* Percentile bar (mini inline) */
    .pbar {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      width: 100%
    }

    .pbar-track {
      flex: 1;
      height: 6px;
      background: var(--surface2);
      border-radius: 3px;
      overflow: hidden
    }

    .pbar-fill {
      height: 100%;
      border-radius: 3px
    }

    /* Scrollbar */
    ::-webkit-scrollbar {
      width: 6px;
      height: 6px
    }

    ::-webkit-scrollbar-track {
      background: var(--bg)
    }

    ::-webkit-scrollbar-thumb {
      background: var(--border);
      border-radius: 3px
    }

    ::-webkit-scrollbar-thumb:hover {
      background: var(--accent)
    }

    /* Tabs */
    .tabs {
      display: flex;
      gap: 0;
      border-bottom: 2px solid var(--border);
      margin-bottom: 20px
    }

    .tab-btn {
      padding: 10px 20px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      border: none;
      background: transparent;
      color: var(--muted);
      border-bottom: 2px solid transparent;
      margin-bottom: -2px;
      transition: color .2s, border-color .2s;
    }

    .tab-btn:hover {
      color: var(--text)
    }

    .tab-btn.active {
      color: var(--accent);
      border-bottom-color: var(--accent)
    }

    .tab-panel {
      display: none
    }

    .tab-panel.active {
      display: block
    }

    /* Responsive — Tablet */
    @media(max-width:900px) {
      .grid {
        grid-template-columns: 1fr
      }

      .full {
        grid-column: auto
      }

      .donut-grid {
        grid-template-columns: 1fr
      }

      .emp-mun-grid {
        grid-template-columns: 1fr
      }

      .topbar {
        padding: 0 16px;
        height: 52px
      }

      .topbar-left {
        gap: 6px
      }

      .topbar h1 {
        font-size: 12px
      }

      .hotmart-logo {
        height: 20px
      }

      .enotas-logo {
        height: 16px
      }

      .topbar-divider {
        height: 20px
      }

      .container {
        padding: 16px
      }

      .stats-row {
        grid-template-columns: repeat(4, 1fr)
      }

      .stat-val {
        font-size: 22px
      }

      .stat-label {
        font-size: 10px
      }

      .stat-sub {
        font-size: 10px
      }

      .tabs {
        overflow-x: auto;
        -webkit-overflow-scrolling: touch
      }

      .tab-btn {
        white-space: nowrap;
        padding: 10px 14px;
        font-size: 12px
      }
    }

    /* Responsive — Mobile */
    @media(max-width:600px) {
      .topbar {
        padding: 0 12px;
        height: 48px
      }

      .topbar-left {
        gap: 4px;
        overflow: hidden;
        min-width: 0
      }

      .topbar h1 {
        font-size: 11px;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis
      }

      .nav-link-home,
      .enotas-wrap {
        display: none !important
      }

      .show-mobile {
        display: inline
      }

      .hide-mobile {
        display: none
      }

      .hotmart-logo {
        height: 18px
      }

      .enotas-logo,
      .topbar-divider:nth-of-type(1),
      .topbar-divider:nth-of-type(2),
      .topbar-divider:nth-of-type(3) {
        display: none
      }

      .container {
        padding: 12px
      }

      .stats-row {
        grid-template-columns: repeat(2, 1fr);
        gap: 8px
      }

      .stat-card {
        padding: 14px 8px
      }

      .stat-val {
        font-size: 20px
      }

      .stat-label,
      .stat-sub {
        font-size: 9px
      }

      .panel {
        padding: 16px
      }

      .panel-title {
        font-size: 13px
      }

      .hbar-label {
        width: 80px;
        font-size: 11px
      }

      .hbar-val {
        width: 55px;
        font-size: 11px
      }

      .hbar-track {
        height: 14px
      }

      .grid {
        gap: 12px
      }

      .tabs {
        overflow-x: auto;
        -webkit-overflow-scrolling: touch;
        flex-wrap: nowrap
      }

      .tab-btn {
        padding: 8px 10px;
        font-size: 11px;
        flex-shrink: 0;
        white-space: nowrap
      }

      .table-wrap {
        font-size: 12px
      }

      thead th {
        padding: 8px 10px;
        font-size: 10px
      }

      tbody td {
        padding: 6px 10px;
        font-size: 12px
      }

      .filter-input {
        font-size: 12px;
        padding: 6px 10px
      }

      .ts-bar {
        font-size: 11px
      }
    }

    /* Modal */
    .modal-overlay {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0, 0, 0, 0.6);
      z-index: 1000;
      align-items: center;
      justify-content: center;
      padding: 24px
    }

    .modal-overlay.on {
      display: flex
    }

    .modal-box {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      max-width: 800px;
      width: 100%;
      max-height: 80vh;
      display: flex;
      flex-direction: column;
      overflow: hidden
    }

    .modal-header {
      padding: 20px 24px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 16px
    }

    .modal-header h3 {
      font-size: 16px;
      color: var(--heading);
      font-weight: 600;
      line-height: 1.4
    }

    .modal-close {
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--muted);
      width: 32px;
      height: 32px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: background .2s, color .2s
    }

    .modal-close:hover {
      background: var(--danger);
      color: var(--heading)
    }

    .modal-body {
      padding: 20px 24px;
      overflow-y: auto
    }

    .motivo-qty-link,
    .status-qty-link {
      cursor: pointer;
      text-decoration: underline;
      text-decoration-style: dotted;
      text-underline-offset: 3px
    }

    .motivo-qty-link:hover,
    .status-qty-link:hover {
      color: var(--danger)
    }

    /* Responsive — Small mobile */
    @media(max-width:380px) {
      .stats-row {
        grid-template-columns: 1fr 1fr;
        gap: 6px
      }

      .stat-val {
        font-size: 18px
      }

      .topbar h1 {
        font-size: 10px
      }

      .nav-link {
        font-size: 10px
      }

      .hbar-label {
        width: 65px;
        font-size: 10px
      }

      .hbar-val {
        width: 45px;
        font-size: 10px
      }
    }
  </style>
</head>

<body>
  <script src="auth.js"></script>
  <div class="topbar">
    <div class="topbar-left">
      <a href="index.html" style="display:flex;align-items:center;text-decoration:none"><img src="hotmart-logo.svg"
          alt="Hotmart" class="hotmart-logo"></a>
      <span class="topbar-divider"></span>
      <a href="index.html" class="enotas-wrap"><img src="enotas-logo.png" alt="eNotas" class="enotas-logo"></a>
      <span class="topbar-divider"></span>
      <a href="index.html" class="nav-link-home">Cidades &
        Provedores</a>
      <span class="topbar-divider"></span>
      <h1><span class="hide-mobile">Monitoramento de Filas NFe</span><span class="show-mobile">Monitoramento NFe</span>
      </h1>
    </div>
    <div class="topbar-right">
      <button class="theme-toggle" id="themeToggle" title="Alternar tema"
        aria-label="Alternar tema claro/escuro"></button>
    </div>
  </div>
  <div class="container" id="app-root"></div>
  <div style="padding:24px 40px;text-align:center;font-size:12px;color:var(--muted)">
    Hotmart — Monitoramento de Filas NFe · Dados do New Relic · 2026
  </div>
  <script src="LogsAlteracoes/monitoramento-nfe-data.js"></script>
  <script>
    'use strict';
    /* Theme */
    (function () {
      var s = localStorage.getItem('theme');
      if (s === 'light') document.documentElement.classList.add('light');
      else if (s === 'dark') document.documentElement.classList.remove('light');
      document.getElementById('themeToggle').addEventListener('click', function () {
        document.documentElement.classList.toggle('light');
        localStorage.setItem('theme', document.documentElement.classList.contains('light') ? 'light' : 'dark');
      });
    })();

    /* Helpers */
    var D = monitoramentoNfeData;
    function esc(s) { if (!s) return '\u2014'; var d = document.createElement('div'); d.textContent = s; return d.innerHTML }
    function fmtMin(v) { return v == null ? '\u2014' : Number(v).toFixed(1) }
    function fmtNum(v) { return v == null ? '\u2014' : Number(v).toLocaleString('pt-BR') }
    function truncMotivo(s, m) { if (!s) return '\u2014'; s = s.replace(/\r?\n/g, ' ').replace(/\s{2,}/g, ' ').trim(); return s.length <= (m || 80) ? s : s.substring(0, m || 80) + '...' }
    function statusLabel(c) { var m = { '0': 'Criada (n\u00e3o enviou)', '1': 'Criada', '2': 'Enviando', '3': 'Enviada', '4': 'Processando', '5': 'Autorizada', '6': 'Negada', '7': 'Cancelada', '12': 'Intermedi\u00e1rio', '13': 'Aguardando Retorno', '14': 'Em Processamento' }; return m[c] || ('Status ' + c) }
    function severityDot(min) {
      if (min >= 30) return '<span class="dot dot-danger"></span>';
      if (min >= 10) return '<span class="dot dot-warn"></span>';
      if (min >= 3) return '<span class="dot dot-muted"></span>';
      return '<span class="dot dot-ok"></span>';
    }
    function pctBar(val, max, cls) {
      var p = max > 0 ? Math.max(val / max * 100, 1) : 0;
      return '<div class="pbar"><div class="pbar-track"><div class="pbar-fill ' + cls + '" style="width:' + p + '%"></div></div><span style="font-size:11px;font-weight:600;color:var(--' + cls + ');min-width:50px;text-align:right">' + fmtMin(val) + ' min</span></div>';
    }

    /* Compute totals */
    /* Separar pendentes (0,1,3,12) vs negadas (6) */
    var totalPendentes = 0, totalNegadas = 0;
    (D.travadasPorStatusMunicipio || []).forEach(function (r) {
      var f = r.facet || [];
      var st = String(f[0]);
      var v = r['latest.nfe.stuck_in_intermediate_status.count'] || 0;
      if (st === '6') totalNegadas += v;
      else totalPendentes += v;
    });
    var totalGeral = totalPendentes + totalNegadas;
    var pioresMaxVal = D.tempoMaxProcessamento.length ? D.tempoMaxProcessamento[0]['max.nfe.processing_time.minutes'] : 0;
    var sg = D.statsGlobais[0] || {};
    var globalAvg = sg['average.nfe.processing_time.minutes'] || 0;
    var globalMax = sg['max.nfe.processing_time.minutes'] || 0;
    var globalP = sg['percentile.nfe.processing_time.minutes'] || {};
    var totalEmp = D.totalEmpresas[0] ? D.totalEmpresas[0]['uniqueCount.empresa.razao_social'] : 0;
    var totalMun = D.totalMunicipios[0] ? D.totalMunicipios[0]['uniqueCount.nfe.municipio_servico'] : 0;
    var totalMunPendentes = D.totalMunicipiosPendentes && D.totalMunicipiosPendentes[0] ? D.totalMunicipiosPendentes[0]['uniqueCount.nfe.municipio_servico'] : D.travadasPorMunicipio.length;

    var h = '';
    h += '<div class="ts-bar">Dados coletados em ' + esc(D.geradoEm) + ' (Bras\u00edlia) \u00b7 Fonte: New Relic \u00b7 <span id="countdown" style="color:var(--accent)"></span></div>';

    /* ── STATS ROW ── */
    h += '<div class="stats-row">';
    h += '<div class="card stat-card"><div class="stat-val" style="color:var(--warn)">' + fmtNum(totalPendentes) + '</div><div class="stat-label">Em Processamento</div><div class="stat-sub">status 0, 1, 3, 12</div></div>';
    h += '<div class="card stat-card"><div class="stat-val" style="color:var(--danger)">' + fmtNum(totalNegadas) + '</div><div class="stat-label">Negadas s/ A\u00e7\u00e3o</div><div class="stat-sub">status 6</div></div>';

    }

    function openMotivoModal(motivo) {
      var needle = normMotivo(motivo);
      var data = (D.travadasMotivoEmpresa || []).filter(function (r) {
        var f = r.facet || [];
        var hay = normMotivo(f[0]);
        return hay === needle || hay.indexOf(needle) >= 0 || needle.indexOf(hay) >= 0;
      });
      data.sort(function (a, b) {
        return (b['latest.nfe.stuck_in_intermediate_status.count'] || 0) - (a['latest.nfe.stuck_in_intermediate_status.count'] || 0);
      });
      var title = truncMotivo(motivo, 120);
      document.getElementById('motivoModalTitle').textContent = 'Empresas — ' + title;
      var body = '';
      if (data.length === 0) {
        body = '<p style="color:var(--muted);font-size:13px">Nenhuma empresa encontrada para este motivo.</p>';
      } else {
        body += '<div class="table-wrap"><table><thead><tr><th>Empresa</th><th style="text-align:right">Quantidade</th></tr></thead><tbody>';
        data.forEach(function (r) {
          var f = r.facet || [];
          var v = r['latest.nfe.stuck_in_intermediate_status.count'] || 0;
          body += '<tr><td style="font-size:12px">' + esc(f[1]) + '</td>';
          body += '<td style="text-align:right;font-weight:600;color:var(--accent)">' + fmtNum(v) + '</td></tr>';
        });
        body += '</tbody></table></div>';
      }
      document.getElementById('motivoModalBody').innerHTML = body;
      document.getElementById('motivoModal').classList.add('on');
    }

    document.getElementById('motivoModalClose').addEventListener('click', function () {
      document.getElementById('motivoModal').classList.remove('on');
    });
    document.getElementById('motivoModal').addEventListener('click', function (e) {
      if (e.target === this) this.classList.remove('on');
    });
    document.addEventListener('keydown', function (e) {
      if (e.key === 'Escape') {
        var m = document.getElementById('motivoModal');
        if (m) m.classList.remove('on');
      }
    });

    document.addEventListener('click', function (e) {
      var link = e.target.closest('.motivo-qty-link');
      if (!link) return;
      var motivo = link.getAttribute('data-motivo');
      if (motivo) openMotivoModal(motivo);
    });

    /* ── Status drill-down (reutiliza motivoModal) ── */
    function openStatusModal(statusCode) {
      var statusData = D.travadasStatusEmpresa || {};
      var data = statusData[String(statusCode)] || [];
      data = data.slice().sort(function (a, b) {
        return (b['latest.nfe.stuck_in_intermediate_status.count'] || 0) - (a['latest.nfe.stuck_in_intermediate_status.count'] || 0);
      });
      document.getElementById('motivoModalTitle').textContent = 'Empresas — ' + statusLabel(statusCode);
      var body = '';
      if (data.length === 0) {
        body = '<p style="color:var(--muted);font-size:13px">Nenhuma empresa encontrada para este status.</p>';
      } else {
        body += '<div class="table-wrap"><table><thead><tr><th>Empresa</th><th style="text-align:right">Quantidade</th></tr></thead><tbody>';
        data.forEach(function (r) {
          var empresa = r['empresa.razao_social'] || r.facet || '';
          var v = r['latest.nfe.stuck_in_intermediate_status.count'] || 0;
          body += '<tr><td style="font-size:12px">' + esc(empresa) + '</td>';
          body += '<td style="text-align:right;font-weight:600;color:var(--accent)">' + fmtNum(v) + '</td></tr>';
        });
        body += '</tbody></table></div>';
      }
      document.getElementById('motivoModalBody').innerHTML = body;
      document.getElementById('motivoModal').classList.add('on');
    }

    document.addEventListener('click', function (e) {
      var link = e.target.closest('.status-qty-link');
      if (!link) return;
      var status = link.getAttribute('data-status');
      if (status) openStatusModal(status);
    });

    /* ── Tab switching ── */
    document.querySelectorAll('.tab-btn').forEach(function (btn) {
      btn.addEventListener('click', function () {
        document.querySelectorAll('.tab-btn').forEach(function (b) { b.classList.remove('active') });
        document.querySelectorAll('.tab-panel').forEach(function (p) { p.classList.remove('active') });
        btn.classList.add('active');
        document.getElementById('tab-' + btn.dataset.tab).classList.add('active');
        if (window._authLogEvent) window._authLogEvent('view_tab', 'monitoramento-' + btn.dataset.tab);
      });
    });

    /* ── Table filtering ── */
    function setupFilter(inputId, tableId) {
      var input = document.getElementById(inputId);
      if (!input) return;
      input.addEventListener('input', function () {
        var q = this.value.toLowerCase();
        var rows = document.querySelectorAll('#' + tableId + ' tbody tr');
        rows.forEach(function (row) {
          row.style.display = row.textContent.toLowerCase().includes(q) ? '' : 'none';
        });
      });
    }
    setupFilter('perfFilter', 'perfTable');
    setupFilter('motivoFilter', 'motivoTable');

    /* ── Table sorting ── */
    document.querySelectorAll('#perfTable thead th[data-col]').forEach(function (th) {
      th.addEventListener('click', function () {
        var col = parseInt(th.dataset.col);
        var tbody = document.querySelector('#perfTable tbody');
        var rows = Array.from(tbody.querySelectorAll('tr'));
        var asc = th.classList.contains('sorted-asc');
        document.querySelectorAll('#perfTable thead th').forEach(function (t) { t.classList.remove('sorted', 'sorted-asc', 'sorted-desc') });
        th.classList.add('sorted', asc ? 'sorted-desc' : 'sorted-asc');
        rows.sort(function (a, b) {
          var va = a.cells[col].textContent.replace(/[^\d.,\-]/g, '').replace(',', '.');
          var vb = b.cells[col].textContent.replace(/[^\d.,\-]/g, '').replace(',', '.');
          var na = parseFloat(va) || 0, nb = parseFloat(vb) || 0;
          if (col === 0) { va = a.cells[0].textContent.toLowerCase(); vb = b.cells[0].textContent.toLowerCase(); return asc ? vb.localeCompare(va) : va.localeCompare(vb) }
          return asc ? na - nb : nb - na;
        });
        rows.forEach(function (r) { tbody.appendChild(r) });
      });
    });

    if (window._authLogEvent) window._authLogEvent('page_view', 'monitoramento-nfe');

    /* Countdown para próxima atualização (a cada 20 min, baseado no timestamp dos dados) */
    (function () {
      var el = document.getElementById('countdown');
      if (!el || !D.geradoEm) return;
      // Parse "dd/MM/yyyy HH:mm" como horário de Brasília (UTC-3)
      var p = D.geradoEm.match(/(\d{2})\/(\d{2})\/(\d{4}) (\d{2}):(\d{2})/);
      if (!p) return;
      var geradoUtc = Date.UTC(+p[3], +p[2] - 1, +p[1], +p[4] + 3, +p[5]); // BR→UTC
      var nextUpdate = geradoUtc + 20 * 60 * 1000; // +20 min
      function tick() {
        var now = Date.now();
        var diff = nextUpdate - now;
        if (diff <= 0) {
          // Já passou, calcular próximo ciclo de 20 min
          var cycles = Math.ceil((now - geradoUtc) / (20 * 60 * 1000));
          nextUpdate = geradoUtc + cycles * 20 * 60 * 1000;
          diff = nextUpdate - now;
        }
        var mins = Math.floor(diff / 60000);
        var secs = Math.floor((diff % 60000) / 1000);
        el.textContent = 'Pr\u00f3xima atualiza\u00e7\u00e3o em ' + mins + ':' + (secs < 10 ? '0' : '') + secs;
      }
      tick();
      setInterval(tick, 1000);
    })();
  </script>
</body>

</html>
