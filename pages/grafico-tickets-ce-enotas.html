<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tickets CE - e-Notas | Criados por Quinzena</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Nunito Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
      background: #F5F5F0;
      color: #32363b;
      padding: 2rem;
    }

    .container {
      max-width: 1100px;
      margin: 0 auto;
      background: #fff;
      border-radius: 12px;
      padding: 2rem;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.06);
    }

    h1 {
      font-size: 1.5rem;
      color: #0D0D0D;
      margin-bottom: 0.5rem;
    }

    .subtitle {
      color: #707780;
      font-size: 0.9rem;
      margin-bottom: 1.5rem;
    }

    .stats {
      display: flex;
      gap: 2rem;
      margin-bottom: 1.5rem;
      flex-wrap: wrap;
    }

    .stat-card {
      background: #F0F0EB;
      border-radius: 8px;
      padding: 1rem 1.5rem;
      min-width: 140px;
    }

    .stat-card .value {
      font-size: 1.8rem;
      font-weight: 700;
      color: #F04E23;
    }

    .stat-card .label {
      font-size: 0.8rem;
      color: #707780;
      margin-top: 0.25rem;
    }

    .chart-wrapper {
      position: relative;
      height: 400px;
      margin-top: 1rem;
    }

    .footer {
      margin-top: 1.5rem;
      font-size: 0.75rem;
      color: #707780;
      text-align: right;
    }
  </style>
</head>

<body>
  <div class="container">
    <h1>Tickets CE — e-Notas (cf[14189])</h1>
    <p class="subtitle">Tickets criados agrupados por quinzena (2 semanas) — Out/2025 a Mai/2026</p>

    <div class="stats">
      <div class="stat-card">
        <div class="value">1.267</div>
        <div class="label">Total de tickets</div>
      </div>
      <div class="stat-card">
        <div class="value">79</div>
        <div class="label">Média por quinzena</div>
      </div>
      <div class="stat-card">
        <div class="value">107</div>
        <div class="label">Pico (29/Out–12/Nov)</div>
      </div>
      <div class="stat-card">
        <div class="value">42</div>
        <div class="label">Mínimo (24/Dez–07/Jan)</div>
      </div>
    </div>

    <div class="chart-wrapper">
      <canvas id="chart"></canvas>
    </div>

    <p class="footer">
      JQL: <code>project = CE AND cf[14189] = e-Notas AND created >= 2025-10-01</code> — Gerado em 11/05/2026
    </p>
  </div>

  <script>
    const labels = [
      '01–14 Out', '15–28 Out', '29 Out–11 Nov', '12–25 Nov',
      '26 Nov–09 Dez', '10–23 Dez', '24 Dez–06 Jan', '07–20 Jan',
      '21 Jan–03 Fev', '04–17 Fev', '18 Fev–03 Mar', '04–17 Mar',
      '18–31 Mar', '01–14 Abr', '15–28 Abr', '29 Abr–11 Mai'
    ];

    const data = [83, 80, 107, 70, 89, 58, 42, 88, 94, 81, 79, 92, 98, 84, 51, 71];

    const ctx = document.getElementById('chart').getContext('2d');
    new Chart(ctx, {
      type: 'bar',
      data: {
        labels: labels,
        datasets: [{
          label: 'Tickets criados',
          data: data,
          backgroundColor: data.map(v => v >= 90 ? '#F04E23' : v >= 70 ? '#F04E23CC' : '#F04E2388'),
          borderColor: '#F04E23',
          borderWidth: 1,
          borderRadius: 4
        }]
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        plugins: {
          legend: { display: false },
          tooltip: {
            callbacks: {
              title: (items) => items[0].label,
              label: (item) => `${item.raw} tickets criados`
            }
          }
        },
        scales: {
          y: {
            beginAtZero: true,
            title: { display: true, text: 'Tickets criados', color: '#707780' },
            grid: { color: '#E0DED8' },
            ticks: { color: '#707780' }
          },
          x: {
            title: { display: true, text: 'Quinzena', color: '#707780' },
            grid: { display: false },
            ticks: { color: '#707780', maxRotation: 45, minRotation: 45, font: { size: 11 } }
          }
        }
      }
    });
  </script>
</body>

</html>
